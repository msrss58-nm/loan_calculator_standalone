<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#2A4BD6" />
<title>מחשבון הלוואות</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap');
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    font-family:'Rubik','Segoe UI',Arial,sans-serif;
    background: linear-gradient(180deg,#EEF1F9 0%, #E7EBF5 100%);
    color:#14213D;
    -webkit-tap-highlight-color: transparent;
  }
  #root { min-height:100vh; padding:20px 12px 60px; display:flex; justify-content:center; }
  .la-shell { width:100%; max-width:460px; }
  .la-header { display:flex; align-items:center; gap:10px; margin-bottom:18px; padding:0 4px; }
  .la-logo {
    width:44px; height:44px; border-radius:14px;
    background: linear-gradient(135deg,#2A4BD6,#5477F0);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 16px rgba(42,75,214,0.35); flex-shrink:0; font-size:20px;
  }
  .la-title { font-size:19px; font-weight:800; letter-spacing:-0.3px; }
  .la-subtitle { font-size:12.5px; color:#6B7A99; margin-top:1px; }

  .la-card { background:#fff; border-radius:20px; padding:18px; box-shadow:0 4px 20px rgba(20,33,61,0.06); margin-bottom:14px; }
  .la-input-row { margin-bottom:16px; }
  .la-input-row:last-child { margin-bottom:0; }
  .la-input-label { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:#4B5877; margin-bottom:8px; }
  .la-input-value { margin-right:auto; font-weight:800; font-size:15px; color:#2A4BD6; font-variant-numeric: tabular-nums; }
  .la-num-input {
    width:100%; border:1.5px solid #E2E7F3; border-radius:12px; padding:10px 12px;
    font-size:16px; font-weight:700; font-family:'Rubik'; color:#14213D; background:#F8F9FD;
    outline:none; box-sizing:border-box; margin-bottom:10px; transition:border-color .15s;
  }
  .la-num-input:focus { border-color:#2A4BD6; }
  input[type=range] {
    -webkit-appearance:none; width:100%; height:6px; border-radius:6px; background:#E2E7F3; outline:none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
    background:#2A4BD6; cursor:pointer; box-shadow:0 2px 6px rgba(42,75,214,.5); border:3px solid #fff;
  }
  input[type=range]::-moz-range-thumb {
    width:20px; height:20px; border-radius:50%; background:#2A4BD6; cursor:pointer; border:3px solid #fff;
  }

  .la-toggle { display:flex; background:#EEF1F9; border-radius:14px; padding:4px; gap:4px; }
  .la-toggle button {
    flex:1; border:none; background:transparent; padding:10px 6px; border-radius:11px;
    font-family:'Rubik'; font-weight:700; font-size:13.5px; color:#5B6786; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px; transition:all .18s;
  }
  .la-toggle button.active { background:#fff; color:#2A4BD6; box-shadow:0 3px 10px rgba(20,33,61,.10); }

  .la-hero { text-align:center; padding:6px 0 2px; }
  .la-hero-label { font-size:13px; color:#6B7A99; font-weight:600; }
  .la-hero-num { font-size:40px; font-weight:800; color:#14213D; margin:2px 0 4px; font-variant-numeric: tabular-nums; }
  .la-hero-sub { font-size:12.5px; color:#8892AB; }

  .la-stats-row { display:flex; gap:10px; margin-top:14px; }
  .la-stat { flex:1; background:#F8F9FD; border-radius:14px; padding:12px; text-align:center; }
  .la-stat-label { font-size:11.5px; color:#8892AB; font-weight:600; margin-bottom:4px; }
  .la-stat-val { font-size:17px; font-weight:800; font-variant-numeric: tabular-nums; }

  .la-save-banner { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:14px; background:linear-gradient(135deg,#E6F9F1,#DFF6EC); margin-top:14px; }
  .la-save-icon { width:34px; height:34px; border-radius:10px; background:#16A34A22; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px; }
  .la-save-text { font-size:12.5px; color:#166534; line-height:1.5; }
  .la-save-text b { font-size:14.5px; }

  .la-donut-wrap { display:flex; align-items:center; gap:18px; }
  .la-donut {
    width:110px; height:110px; border-radius:50%; flex-shrink:0; position:relative;
  }
  .la-donut::after {
    content:""; position:absolute; inset:16px; background:#fff; border-radius:50%;
  }
  .la-donut-legend { flex:1; }
  .la-legend-item { display:flex; align-items:center; gap:8px; margin-bottom:10px; font-size:13px; }
  .la-legend-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
  .la-legend-val { margin-right:auto; font-weight:700; font-variant-numeric: tabular-nums; }

  .la-section-title { display:flex; align-items:center; gap:8px; font-size:15px; font-weight:800; margin-bottom:12px; }
  .la-section-title .count { margin-right:auto; font-size:12px; font-weight:600; color:#8892AB; }

  .la-row { border:1.5px solid #EEF0F7; border-radius:14px; margin-bottom:8px; overflow:hidden; transition:border-color .15s; }
  .la-row.has-extra { border-color:#2A4BD6; }
  .la-row-head { display:flex; align-items:center; gap:10px; padding:11px 12px; cursor:pointer; }
  .la-row-month { width:30px; height:30px; border-radius:9px; background:#F0F2FA; color:#5B6786; font-size:12.5px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .la-row-mid { flex:1; min-width:0; }
  .la-row-date { font-size:12px; color:#8892AB; font-weight:600; }
  .la-row-payment { font-size:14.5px; font-weight:800; font-variant-numeric: tabular-nums; }
  .la-row-badge { font-size:10.5px; font-weight:700; padding:3px 7px; border-radius:7px; background:#2A4BD61A; color:#2A4BD6; white-space:nowrap; }
  .la-row-body { padding:0 14px 14px; border-top:1px dashed #EEF0F7; }
  .la-row-detail-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:12px 0; }
  .la-detail-cell { text-align:center; }
  .la-detail-label { font-size:10.5px; color:#8892AB; font-weight:600; margin-bottom:2px; }
  .la-detail-val { font-size:13px; font-weight:800; font-variant-numeric: tabular-nums; }

  .la-extra-label { font-size:12.5px; font-weight:700; color:#4B5877; margin:10px 0 8px; }
  .la-option-row { display:flex; gap:8px; margin-bottom:10px; }
  .la-option-chip { flex:1; border:1.5px solid #E2E7F3; border-radius:11px; padding:9px 6px; background:#F8F9FD; font-family:'Rubik'; font-size:12px; font-weight:700; color:#4B5877; display:flex; align-items:center; justify-content:center; gap:5px; cursor:pointer; }
  .la-option-chip.active { border-color:#2A4BD6; background:#2A4BD61A; color:#2A4BD6; }
  .la-btn-row { display:flex; gap:8px; }
  .la-btn { flex:1; border:none; border-radius:11px; padding:10px; font-family:'Rubik'; font-weight:700; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
  .la-btn-primary { background:#2A4BD6; color:#fff; }
  .la-btn-ghost { background:#F0F2FA; color:#6B7A99; }

  .la-more-btn { width:100%; border:1.5px dashed #C7CFE6; background:transparent; border-radius:14px; padding:12px; font-family:'Rubik'; font-weight:700; font-size:13px; color:#5B6786; cursor:pointer; margin-top:4px; }
  .la-reset-link { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:700; color:#8892AB; background:none; border:none; cursor:pointer; margin-right:auto; }
  .la-info-note { display:flex; gap:8px; font-size:12px; color:#6B7A99; line-height:1.6; background:#F8F9FD; border-radius:12px; padding:12px; margin-bottom:14px; }
  .la-chart-svg { width:100%; height:150px; display:block; }
  .la-footer-note { text-align:center; font-size:11px; color:#9AA3BD; margin-top:6px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  "use strict";

  // ---------- persistence ----------
  var STORAGE_KEY = "loanAppStateV1";
  function loadState(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return null;
  }
  function saveState(){
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        amount: state.amount, rate: state.rate, term: state.term,
        method: state.method, extra: state.extra
      }));
    } catch(e) {}
  }

  var saved = loadState();
  var state = Object.assign({
    amount: 18000, rate: 4.3, term: 29, method: "spitzer",
    extra: { spitzer: {}, equal: {} },
    openRow: null, draftAmount: "", draftOption: 1, visibleCount: 12
  }, saved || {});

  // ---------- finance helpers ----------
  function pmt(rate, nper, pv) {
    if (rate === 0) return -pv / nper;
    return (-rate * pv) / (1 - Math.pow(1 + rate, -nper));
  }

  function buildSchedule(method, principal, annualPct, termMonths, extraMap) {
    var rate = annualPct / 100 / 12;
    var rows = [];
    var balance = principal;
    var current = method === "spitzer"
      ? Math.ceil(-pmt(rate, termMonths, principal))
      : Math.ceil(principal / termMonths);

    var today = new Date();
    var date = new Date(today.getFullYear(), today.getMonth(), 1);
    var i = 1;
    var maxIter = termMonths + 360;

    while (balance > 0.5 && i <= maxIter) {
      var interest = Math.round(balance * rate);
      var entry = extraMap[i];
      var extra = (entry && entry.amount) || 0;
      var option = (entry && entry.option) || 1;
      var remaining = Math.max(1, termMonths - i + 1);

      var wouldFinish = method === "spitzer"
        ? balance <= current + interest
        : balance <= current;

      var principalPay, paymentTotal, closing;

      if (wouldFinish) {
        principalPay = balance;
        paymentTotal = balance + interest;
        closing = 0;
      } else {
        if (extra > 0 && option === 2) {
          if (method === "spitzer") {
            current = Math.min(current, Math.ceil(-pmt(rate, remaining, balance)));
          } else {
            current = Math.min(current, Math.ceil(balance / remaining));
          }
        }
        if (method === "spitzer") {
          paymentTotal = current;
          principalPay = Math.round(current - interest);
        } else {
          principalPay = current;
          paymentTotal = Math.round(principalPay + interest);
        }
        closing = Math.max(0, Math.round(balance - principalPay - extra));
      }

      rows.push({
        month: i, date: new Date(date), opening: Math.round(balance),
        payment: paymentTotal, principal: principalPay, interest: interest,
        extra: extra, option: extra > 0 ? option : null, closing: closing
      });

      balance = closing;
      date = new Date(date.getFullYear(), date.getMonth() + 1, 1);
      i++;
    }

    var totalInterest = rows.reduce(function(s,r){ return s + r.interest; }, 0);
    var totalPaid = rows.reduce(function(s,r){ return s + r.payment + r.extra; }, 0);
    return {
      rows: rows, totalInterest: totalInterest, totalPaid: totalPaid,
      firstPayment: rows[0] ? rows[0].payment : 0, numPayments: rows.length
    };
  }

  var nf = new Intl.NumberFormat("he-IL", { maximumFractionDigits: 0 });
  function money(n){ return nf.format(Math.round(n||0)) + " ₪"; }
  function monthLabel(d){ return new Intl.DateTimeFormat("he-IL",{month:"long",year:"numeric"}).format(d); }

  function buildAreaSVG(points){
    var w = 300, h = 130, pad = 4;
    if (points.length === 0) return "";
    var max = Math.max.apply(null, points.map(function(p){return p;})) || 1;
    var n = points.length;
    var step = n > 1 ? (w - pad*2) / (n - 1) : 0;
    var coords = points.map(function(v, idx){
      var x = pad + idx * step;
      var y = h - pad - (v / max) * (h - pad*2);
      return [x,y];
    });
    var linePath = "M " + coords.map(function(c){return c[0].toFixed(1)+","+c[1].toFixed(1);}).join(" L ");
    var areaPath = linePath + " L " + (pad+(n-1)*step).toFixed(1) + "," + (h-pad) + " L " + pad + "," + (h-pad) + " Z";
    return '<svg class="la-chart-svg" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">' +
      '<defs><linearGradient id="balGrad" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#2A4BD6" stop-opacity="0.35"/>' +
      '<stop offset="100%" stop-color="#2A4BD6" stop-opacity="0.02"/>' +
      '</linearGradient></defs>' +
      '<path d="'+areaPath+'" fill="url(#balGrad)" stroke="none"/>' +
      '<path d="'+linePath+'" fill="none" stroke="#2A4BD6" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>' +
      '</svg>';
  }

  // icons (tiny inline svg, no deps)
  var ICON = {
    landmark: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></svg>',
    wallet: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2A4BD6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>',
    percent: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2A4BD6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>',
    calendar: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2A4BD6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    down: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>',
    piggy: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 5c-1.5-1.5-4-2-6-2C8 3 4 6 4 11c0 2 1 4 2 5l-1 3h3l1-2c1 .5 2 .5 3 .5s2 0 3-.5l1 2h3l-1-3c1-1 2-3 2-5 0-1-.2-2-1-3"/><circle cx="8" cy="10" r="0.5" fill="currentColor"/></svg>',
    chevronDown: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8892AB" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
    chevronUp: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8892AB" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>',
    scissors: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>',
    check: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    x: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B7A99" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
    info: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8892AB" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
    reset: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8892AB" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>'
  };

  function esc(s){ return String(s); }

  function render(){
    var safeAmount = Math.max(0, Number(state.amount) || 0);
    var safeRate = Math.max(0, Number(state.rate) || 0);
    var safeTerm = Math.max(1, Math.round(Number(state.term) || 1));

    var baseSpitzer = buildSchedule("spitzer", safeAmount, safeRate, safeTerm, {});
    var baseEqual = buildSchedule("equal", safeAmount, safeRate, safeTerm, {});
    var schedule = buildSchedule(state.method, safeAmount, safeRate, safeTerm, state.extra[state.method]);

    var savings = baseSpitzer.totalInterest - baseEqual.totalInterest;
    var better = savings > 0 ? "equal" : "spitzer";

    var interestShare = schedule.totalInterest / Math.max(1, (safeAmount + schedule.totalInterest)) * 100;
    var donutStyle = "background: conic-gradient(#2A4BD6 0% " + (100-interestShare).toFixed(1) + "%, #F5A524 " + (100-interestShare).toFixed(1) + "% 100%);";

    var visibleRows = schedule.rows.slice(0, state.visibleCount);
    var hasMore = state.visibleCount < schedule.rows.length;
    var extraCount = Object.keys(state.extra[state.method]).length;

    var html = '';
    html += '<div class="la-shell">';

    // header
    html += '<div class="la-header"><div class="la-logo">' + ICON.landmark + '</div>' +
      '<div><div class="la-title">מחשבון הלוואות</div>' +
      '<div class="la-subtitle">שפיצר מול קרן שווה, עם תשלומים נוספים</div></div></div>';

    // inputs card
    html += '<div class="la-card">';
    html += '<div class="la-input-row">' +
      '<div class="la-input-label">'+ICON.wallet+' סכום ההלוואה<span class="la-input-value">'+money(safeAmount)+'</span></div>' +
      '<input class="la-num-input" type="number" data-bind="amount" value="'+safeAmount+'" />' +
      '<input type="range" data-bind="amount" min="500" max="500000" step="500" value="'+safeAmount+'" />' +
      '</div>';
    html += '<div class="la-input-row">' +
      '<div class="la-input-label">'+ICON.percent+' ריבית שנתית<span class="la-input-value">'+safeRate+'%</span></div>' +
      '<input class="la-num-input" type="number" step="0.01" data-bind="rate" value="'+safeRate+'" />' +
      '<input type="range" data-bind="rate" min="0" max="25" step="0.1" value="'+safeRate+'" />' +
      '</div>';
    html += '<div class="la-input-row">' +
      '<div class="la-input-label">'+ICON.calendar+' תקופה בחודשים<span class="la-input-value">'+safeTerm+' חודשים</span></div>' +
      '<input class="la-num-input" type="number" data-bind="term" value="'+safeTerm+'" />' +
      '<input type="range" data-bind="term" min="1" max="360" step="1" value="'+safeTerm+'" />' +
      '</div>';
    html += '</div>';

    // method + hero
    html += '<div class="la-card">';
    html += '<div class="la-toggle">' +
      '<button data-action="method" data-method="spitzer" class="'+(state.method==="spitzer"?"active":"")+'">'+ICON.down+' שפיצר</button>' +
      '<button data-action="method" data-method="equal" class="'+(state.method==="equal"?"active":"")+'" style="color:'+(state.method==="equal"?"#2A4BD6":"#5B6786")+'">'+ICON.piggy+' קרן שווה</button>' +
      '</div>';
    html += '<div class="la-hero"><div class="la-hero-label">תשלום ראשון בשיטה זו</div>' +
      '<div class="la-hero-num">'+money(schedule.firstPayment)+'</div>' +
      '<div class="la-hero-sub">'+schedule.numPayments+' תשלומים · סה"כ החזר '+money(schedule.totalPaid)+'</div></div>';
    html += '<div class="la-stats-row">' +
      '<div class="la-stat"><div class="la-stat-label">סה"כ ריבית</div><div class="la-stat-val" style="color:#F5A524">'+money(schedule.totalInterest)+'</div></div>' +
      '<div class="la-stat"><div class="la-stat-label">סה"כ קרן</div><div class="la-stat-val" style="color:#2A4BD6">'+money(safeAmount)+'</div></div>' +
      '</div>';
    if (savings !== 0) {
      html += '<div class="la-save-banner"><div class="la-save-icon">🐷</div>' +
        '<div class="la-save-text">שיטת <b>'+(better==="equal"?"קרן שווה":"שפיצר")+'</b> חוסכת כ- <b>'+money(Math.abs(savings))+'</b> ריבית לעומת השיטה השנייה (ללא תשלומים נוספים).</div></div>';
    }
    html += '</div>';

    // donut
    html += '<div class="la-card"><div class="la-section-title">התפלגות התשלום הכולל</div>';
    html += '<div class="la-donut-wrap"><div class="la-donut" style="'+donutStyle+'"></div>';
    html += '<div class="la-donut-legend">' +
      '<div class="la-legend-item"><span class="la-legend-dot" style="background:#2A4BD6"></span>קרן<span class="la-legend-val">'+money(safeAmount)+'</span></div>' +
      '<div class="la-legend-item"><span class="la-legend-dot" style="background:#F5A524"></span>ריבית<span class="la-legend-val">'+money(schedule.totalInterest)+'</span></div>' +
      '</div></div></div>';

    // balance chart
    html += '<div class="la-card"><div class="la-section-title">ירידת היתרה לאורך זמן</div>';
    html += buildAreaSVG(schedule.rows.map(function(r){return r.closing;}));
    html += '</div>';

    // schedule
    html += '<div class="la-card"><div class="la-section-title">לוח סילוקין<span class="count">'+schedule.numPayments+' תשלומים</span></div>';
    html += '<div class="la-info-note">'+ICON.info+'<span>לחצו על חודש כדי להוסיף תשלום נוסף: <b>קיצור תקופה</b> משאיר את התשלום כפי שהוא ומסיים מוקדם יותר, ו<b>הקטנת תשלום</b> מחשב תשלום חודשי נמוך יותר להמשך הדרך.</span></div>';

    if (extraCount > 0) {
      html += '<div style="display:flex;margin-bottom:10px;"><button class="la-reset-link" data-action="reset-extras">'+ICON.reset+' נקה את כל התשלומים הנוספים ('+extraCount+')</button></div>';
    }

    visibleRows.forEach(function(r){
      var isOpen = state.openRow === r.month;
      var has = r.extra > 0;
      html += '<div class="la-row'+(has?" has-extra":"")+'">';
      html += '<div class="la-row-head" data-action="toggle-row" data-month="'+r.month+'">' +
        '<div class="la-row-month">'+r.month+'</div>' +
        '<div class="la-row-mid"><div class="la-row-date">'+monthLabel(r.date)+'</div>' +
        '<div class="la-row-payment">'+money(r.payment + r.extra)+'</div></div>';
      if (has) {
        html += '<div class="la-row-badge">'+(r.option===2?"💸 הקטנה":"✂️ קיצור")+' +'+nf.format(r.extra)+'</div>';
      }
      html += (isOpen ? ICON.chevronUp : ICON.chevronDown) + '</div>';

      if (isOpen) {
        html += '<div class="la-row-body">';
        html += '<div class="la-row-detail-grid">' +
          '<div class="la-detail-cell"><div class="la-detail-label">יתרת פתיחה</div><div class="la-detail-val">'+money(r.opening)+'</div></div>' +
          '<div class="la-detail-cell"><div class="la-detail-label">קרן</div><div class="la-detail-val" style="color:#2A4BD6">'+money(r.principal)+'</div></div>' +
          '<div class="la-detail-cell"><div class="la-detail-label">ריבית</div><div class="la-detail-val" style="color:#F5A524">'+money(r.interest)+'</div></div>' +
          '</div>';
        html += '<div class="la-extra-label">תשלום נוסף בחודש זה</div>';
        html += '<input class="la-num-input" type="number" placeholder="לדוגמה: 500" data-draft-amount value="'+esc(state.draftAmount)+'" />';
        html += '<div class="la-option-row">' +
          '<div class="la-option-chip'+(state.draftOption===1?" active":"")+'" data-action="set-option" data-option="1">'+ICON.scissors+' קיצור תקופה</div>' +
          '<div class="la-option-chip'+(state.draftOption===2?" active":"")+'" data-action="set-option" data-option="2">'+ICON.down+' הקטנת תשלום</div>' +
          '</div>';
        html += '<div class="la-btn-row">' +
          '<button class="la-btn la-btn-primary" data-action="save-extra" data-month="'+r.month+'">'+ICON.check+' שמירה</button>';
        if (has) {
          html += '<button class="la-btn la-btn-ghost" data-action="clear-extra" data-month="'+r.month+'">'+ICON.x+' מחיקה</button>';
        }
        html += '</div></div>';
      }
      html += '</div>';
    });

    if (hasMore) {
      html += '<button class="la-more-btn" data-action="show-more">הצג עוד חודשים ('+(schedule.rows.length - state.visibleCount)+' נותרו)</button>';
    }
    html += '</div>';

    html += '<div class="la-footer-note">הנתונים נשמרים אוטומטית במכשיר הזה בלבד</div>';
    html += '</div>';

    root.innerHTML = html;

    // restore focus-friendly draft input value binding after DOM swap
    var draftInput = root.querySelector('[data-draft-amount]');
    if (draftInput) {
      draftInput.addEventListener('input', function(e){
        state.draftAmount = e.target.value;
      });
    }
  }

  var root = document.getElementById('root');

  function openEditor(month){
    if (state.openRow === month) { state.openRow = null; render(); return; }
    state.openRow = month;
    var existing = state.extra[state.method][month];
    state.draftAmount = existing ? String(existing.amount) : "";
    state.draftOption = existing ? existing.option : 1;
    render();
  }

  function saveExtra(month){
    var val = Number(state.draftAmount) || 0;
    if (val <= 0) delete state.extra[state.method][month];
    else state.extra[state.method][month] = { amount: val, option: state.draftOption };
    state.openRow = null;
    saveState();
    render();
  }

  function clearExtra(month){
    delete state.extra[state.method][month];
    state.openRow = null;
    saveState();
    render();
  }

  // event delegation
  root.addEventListener('click', function(e){
    var actionEl = e.target.closest('[data-action]');
    if (!actionEl) return;
    var action = actionEl.getAttribute('data-action');
    if (action === 'method') {
      state.method = actionEl.getAttribute('data-method');
      state.visibleCount = 12;
      state.openRow = null;
      saveState();
      render();
    } else if (action === 'toggle-row') {
      openEditor(Number(actionEl.getAttribute('data-month')));
    } else if (action === 'set-option') {
      state.draftOption = Number(actionEl.getAttribute('data-option'));
      render();
    } else if (action === 'save-extra') {
      saveExtra(Number(actionEl.getAttribute('data-month')));
    } else if (action === 'clear-extra') {
      clearExtra(Number(actionEl.getAttribute('data-month')));
    } else if (action === 'reset-extras') {
      state.extra[state.method] = {};
      saveState();
      render();
    } else if (action === 'show-more') {
      state.visibleCount += 12;
      render();
    }
  });

  root.addEventListener('input', function(e){
    var bind = e.target.getAttribute('data-bind');
    if (bind) {
      state[bind] = e.target.value;
      state.visibleCount = 12;
      saveState();
      render();
      // restore focus to the same control type after re-render
      var again = root.querySelector('[data-bind="'+bind+'"][type="'+e.target.type+'"]');
      if (again && e.target.type === 'number') { again.focus(); }
    }
  });

  render();
})();
</script>
</body>
</html>
